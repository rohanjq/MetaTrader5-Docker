# 15 Aggressive Live Strategies — Max trade frequency
# 7 best-tested + 8 research strategies, all enabled
# Loose cooldowns, multi-position, high daily trade limit

global:
  risk_pct: 1.0
  sl: 0
  rr: 0
  magic: 300
  multi_position: true
  max_positions: 5
  max_daily_trades: 100
  cooldown_sec: 60
  reversal_cooldown: 60
  max_consec_loss: 0
  consec_loss_pause: 0
  slippage: 20

trailing:
  breakeven_start: 0.0
  trail_start: 0.0
  trail_step: 2.0

indicators:
  utbot_period: 10
  utbot_mult: 2.0
  dc_length: 20
  round_level: 500.0
  liq_lookback: 20

control:
  use_control_file: false
  write_status_file: false
  control_poll_sec: 5

strategies:
  # === BEST TESTED (PF > 1.2) ===

  # S01 — PF 3.34, sell-only
  - name: failed_bb_sell
    enabled: true
    sl: 350.0
    rr: 1.5
    buy: ""
    sell: "bb_M15.reenter_above==TRUE|utbot_H1.bias==BEARISH|candle_M3.is_bearish==TRUE|ema200_M15.price_vs==BELOW|adx_M15.strength in STRONG_TREND,TRENDING"

  # S02 — PF 2.69, tight stoch filter
  - name: stoch_os_tight
    enabled: true
    sl: 350.0
    rr: 1.5
    buy: "stoch_M15.zone==OS|utbot_H1.bias==BULLISH|vwap_M5.price_vs==BELOW|ema200_M15.price_vs==ABOVE|adx_M15.strength in STRONG_TREND,TRENDING|candle_M3.is_bullish==TRUE"
    sell: "stoch_M15.zone==OB|utbot_H1.bias==BEARISH|vwap_M5.price_vs==ABOVE|ema200_M15.price_vs==BELOW|adx_M15.strength in STRONG_TREND,TRENDING|candle_M3.is_bearish==TRUE"

  # S03 — PF 2.60, RSI2 extreme buy-only
  - name: rsi2_extreme_buy
    enabled: true
    sl: 350.0
    rr: 2.0
    buy: "rsi2_M5.zone==EXTREME_OS|utbot_H1.bias==BULLISH|vwap_M5.price_vs==BELOW|ema200_M15.price_vs==ABOVE|candle_M3.is_bullish==TRUE"
    sell: ""

  # S04 — PF 1.69, DC zone + ADX
  - name: dc_lowzone_adx
    enabled: true
    sl: 350.0
    rr: 2.0
    buy: "dc_M15.zone in LOWER,LOWER_MID|utbot_H1.bias==BULLISH|candle_M3.is_bullish==TRUE|ema200_M15.price_vs==ABOVE|adx_M15.strength in STRONG_TREND,TRENDING"
    sell: "dc_M15.zone in UPPER,UPPER_MID|utbot_H1.bias==BEARISH|candle_M3.is_bearish==TRUE|ema200_M15.price_vs==BELOW|adx_M15.strength in STRONG_TREND,TRENDING"

  # S05 — PF 1.42, 68 trades, best volume
  - name: vwap_trend
    enabled: true
    sl: 350.0
    rr: 1.5
    buy: "vwap_M5.price_vs==BELOW|utbot_H1.bias==BULLISH|candle_M3.is_bullish==TRUE|ema200_M15.price_vs==ABOVE"
    sell: "vwap_M5.price_vs==ABOVE|utbot_H1.bias==BEARISH|candle_M3.is_bearish==TRUE|ema200_M15.price_vs==BELOW"

  # S06 — PF 1.35, stoch wide zone
  - name: stoch_wide
    enabled: true
    sl: 350.0
    rr: 1.5
    buy: "stoch_M15.zone in OS,NEUTRAL|utbot_H1.bias==BULLISH|vwap_M5.price_vs==BELOW|ema200_M15.price_vs==ABOVE|adx_M15.strength in STRONG_TREND,TRENDING|candle_M3.is_bullish==TRUE"
    sell: "stoch_M15.zone in OB,NEUTRAL|utbot_H1.bias==BEARISH|vwap_M5.price_vs==ABOVE|ema200_M15.price_vs==BELOW|adx_M15.strength in STRONG_TREND,TRENDING|candle_M3.is_bearish==TRUE"

  # S07 — PF 1.25, exhausted trend sell
  - name: exhausted_sell
    enabled: true
    sl: 350.0
    rr: 2.0
    buy: ""
    sell: "utbot_M15.bullish_since>=8|candle_M5.type==SHOOTING_STAR|dc_M15.zone in UPPER,UPPER_MID|candle_M3.is_bearish==TRUE|ema200_M15.price_vs==BELOW"

  # === RESEARCH (diverse signal types) ===

  # S08 — Connors RSI2 pullback
  - name: mr1_connors_rsi2
    enabled: true
    sl: 400.0
    rr: 1.0
    buy: "ema200_H1.price_vs==ABOVE|ema200_H1.slope==RISING|rsi2_M15.zone in EXTREME_OS,OS|candle_M5.is_bullish==TRUE"
    sell: "ema200_H1.price_vs==BELOW|ema200_H1.slope==FALLING|rsi2_M15.zone in EXTREME_OB,OB|candle_M5.is_bearish==TRUE"

  # S09 — EMA RSI ADX trend confirmation
  - name: tp1_ema_rsi_adx
    enabled: true
    sl: 400.0
    rr: 1.0
    buy: "ema9_M15.price_vs==ABOVE|ema21_M15.price_vs==ABOVE|ema9_M15.slope==RISING|rsi14_M15.value>55|adx_H1.strength in TRENDING,STRONG_TREND|adx_H1.di_bias==BULLISH"
    sell: "ema9_M15.price_vs==BELOW|ema21_M15.price_vs==BELOW|ema9_M15.slope==FALLING|rsi14_M15.value<45|adx_H1.strength in TRENDING,STRONG_TREND|adx_H1.di_bias==BEARISH"

  # S10 — Stochastic momentum + EMA
  - name: tp2_stoch_momentum
    enabled: true
    sl: 400.0
    rr: 1.0
    buy: "ema9_H1.price_vs==ABOVE|ema50_H1.slope==RISING|stoch_M30.zone==OS|macd_M30.hist_dir==RISING|candle_M15.is_bullish==TRUE"
    sell: "ema9_H1.price_vs==BELOW|ema50_H1.slope==FALLING|stoch_M30.zone==OB|macd_M30.hist_dir==FALLING|candle_M15.is_bearish==TRUE"

  # S11 — Higher-TF pullback rider
  - name: tp3_anwar_pullback
    enabled: true
    sl: 400.0
    rr: 1.0
    buy: "ema50_H1.price_vs==ABOVE|ema200_H4.price_vs==ABOVE|adx_H1.strength in TRENDING,STRONG_TREND|dc_M15.zone in LOWER_MID,MIDDLE|candle_M15.is_bullish==TRUE"
    sell: "ema50_H1.price_vs==BELOW|ema200_H4.price_vs==BELOW|adx_H1.strength in TRENDING,STRONG_TREND|dc_M15.zone in UPPER_MID,MIDDLE|candle_M15.is_bearish==TRUE"

  # S12 — Turtle-style Donchian breakout
  - name: bo1_turtle_breakout
    enabled: true
    sl: 400.0
    rr: 1.0
    buy: "ema200_H4.price_vs==ABOVE|dc_H1.zone==UPPER|adx_H1.strength in TRENDING,STRONG_TREND|macd_H1.vs_zero==ABOVE"
    sell: "ema200_H4.price_vs==BELOW|dc_H1.zone==LOWER|adx_H1.strength in TRENDING,STRONG_TREND|macd_H1.vs_zero==BELOW"

  # S13 — VWAP + RSI alignment
  - name: cl1_vwap_rsi_align
    enabled: true
    sl: 400.0
    rr: 1.0
    buy: "vwap_M15.price_vs==ABOVE|rsi14_H1.value>50|rsi14_M15.zone==NEUTRAL|utbot_M15.bias==BULLISH|macd_M15.vs_zero==ABOVE"
    sell: "vwap_M15.price_vs==BELOW|rsi14_H1.value<50|rsi14_M15.zone==NEUTRAL|utbot_M15.bias==BEARISH|macd_M15.vs_zero==BELOW"

  # S14 — Liquidity sweep reversal
  - name: cl2_liq_sweep_reversal
    enabled: true
    sl: 400.0
    rr: 1.0
    buy: "utbot_H1.bias==BULLISH|liq_M5.lower_swept==TRUE|dc_M5.lower_wick_rej==TRUE|candle_M5.type==HAMMER|candle_M5.is_bullish==TRUE"
    sell: "utbot_H1.bias==BEARISH|liq_M5.upper_swept==TRUE|dc_M5.upper_wick_rej==TRUE|candle_M5.type==SHOOTING_STAR|candle_M5.is_bearish==TRUE"

  # S15 — BB RSI range reversion
  - name: mr3_bb_rsi_range
    enabled: true
    sl: 400.0
    rr: 1.0
    buy: "adx_H1.strength in RANGING,WEAK_TREND|bb_M15.reenter_below==TRUE|rsi14_M15.zone==OS|candle_M5.is_bullish==TRUE"
    sell: "adx_H1.strength in RANGING,WEAK_TREND|bb_M15.reenter_above==TRUE|rsi14_M15.zone==OB|candle_M5.is_bearish==TRUE"
