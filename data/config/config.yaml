backtest:
  symbol: BTCUSDT
  period: M1
  model: 1
  from: "2026.01.13"
  to: "2026.06.13"
  deposit: 10000
  leverage: "1:100"

global:
  risk_pct: 3.0
  sl: 0
  rr: 0
  magic: 300
  multi_position: true
  max_positions: 3
  max_daily_trades: 50
  cooldown_sec: 900
  reversal_cooldown: 0
  max_consec_loss: 0
  consec_loss_pause: 0
  slippage: 20

trailing:
  breakeven_start: 0.0
  trail_start: 0.0
  trail_step: 2.0

indicators:
  utbot_period: 10
  utbot_mult: 2.0
  dc_length: 20
  round_level: 500.0
  liq_lookback: 20

control:
  use_control_file: false
  write_status_file: false
  control_poll_sec: 5

# ── Production Portfolio ──────────────────────────────────────────
# Only L1/L2 survived the 6-month test with PF > 1.0.
# All other 13 strategies were overfit to the 2-month window.

strategies:
  # L1: Sweep + Stoch — best 6-month performer
  # PF=1.08, WR=43%, 87 trades, MaxDD=34.4%, +$1027
  - name: liq_sweep_stoch
    enabled: true
    sl: 400.0
    rr: 1.5
    buy: "liq_M15.lower_swept==TRUE|stoch_M15.zone==OS|candle_M3.is_bullish==TRUE|ema200_M15.price_vs==ABOVE"
    sell: "liq_M15.upper_swept==TRUE|stoch_M15.zone==OB|candle_M3.is_bearish==TRUE|ema200_M15.price_vs==BELOW"

  # L2: Sweep + Stoch + Established Trend — second best
  # PF=1.07, WR=42%, 66 trades, MaxDD=33.3%, +$707
  - name: liq_sweep_stoch_trend
    enabled: true
    sl: 400.0
    rr: 1.5
    buy: "liq_M15.lower_swept==TRUE|stoch_M15.zone==OS|candle_M3.is_bullish==TRUE|utbot_H1.bias==BULLISH|utbot_H1.bullish_since>=5|ema200_M15.price_vs==ABOVE"
    sell: "liq_M15.upper_swept==TRUE|stoch_M15.zone==OB|candle_M3.is_bearish==TRUE|utbot_H1.bias==BEARISH|utbot_H1.bearish_since>=5|ema200_M15.price_vs==BELOW"
